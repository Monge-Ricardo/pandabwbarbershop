services:
  - type: web
    name: pandabwbarbershop-backend
    runtime: python
    # Render will automatically use Python 3.11+
    # We must run our copy_binaries script during build to copy query engines to the project root
    buildCommand: pip install -r requirements.txt && python copy_binaries.py && prisma generate
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PRISMA_BINARY_CACHE_DIR
        value: /opt/render/project/src/prisma_binaries
      - key: DATABASE_URL
        sync: false # User will input this in Render dashboard
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
